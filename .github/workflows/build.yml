name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # actions/checkout@v4.1.7 (Consider adding Dependabot to keep this updated)
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 9

      - name: Setup Node.js
        # actions/setup-node@v4.0.3 (Consider adding Dependabot to keep this updated)
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build Project
        run: pnpm run build

      - name: Generate Tarball
        run: pnpm pack

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitgenie-package
          path: '*.tgz'
          retention-days: 7
